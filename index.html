<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PropEdge</title>
    <link rel="icon" href="/Gamblebot3.0/favicon.svg" />
    <meta name="theme-color" content="#0b1220" />
    <style>
      :root {
        --bg: #08111f;
        --panel: #0f172a;
        --line: #243244;
        --text: #e5edf7;
        --muted: #9fb0c7;
        --green: #22c55e;
        --yellow: #f59e0b;
        --red: #ef4444;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #08111f;
        color: var(--text);
      }
      .wrap {
        max-width: 1200px;
        margin: 0 auto;
        padding: 24px 16px 48px;
      }
      h1 {
        margin: 0 0 6px;
        font-size: 34px;
      }
      .subtitle {
        color: var(--muted);
        margin-bottom: 18px;
      }
      .toolbar {
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr)) auto auto;
        gap: 12px;
        margin-bottom: 18px;
      }
      .field {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 10px;
      }
      .field label {
        display: block;
        font-size: 12px;
        color: var(--muted);
        margin-bottom: 6px;
      }
      .field input, .field select {
        width: 100%;
        background: #0b1220;
        color: var(--text);
        border: 1px solid #334155;
        border-radius: 8px;
        padding: 10px 12px;
      }
      button {
        border: 0;
        border-radius: 10px;
        padding: 11px 14px;
        font-weight: 700;
        cursor: pointer;
        align-self: end;
      }
      .btn-primary {
        background: var(--green);
        color: #05210e;
      }
      .btn-secondary {
        background: #1e293b;
        color: var(--text);
        border: 1px solid #334155;
      }
      .status {
        margin-bottom: 14px;
        color: var(--muted);
      }
      .card {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 16px;
        margin-bottom: 18px;
      }
      .error {
        color: #fca5a5;
      }
      .ok {
        color: #86efac;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th, td {
        padding: 12px 10px;
        text-align: left;
        border-bottom: 1px solid #1f2d3f;
        font-size: 14px;
      }
      th {
        color: var(--muted);
      }
      .green { color: #86efac; font-weight: 700; }
      .yellow { color: #fcd34d; font-weight: 700; }
      .red { color: #fca5a5; font-weight: 700; }
      .pick-card {
        background: #0b1220;
        border: 1px solid #223047;
        border-radius: 14px;
        padding: 14px;
        margin-bottom: 12px;
      }
      .pick-card-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        margin-bottom: 10px;
      }
      .pick-player {
        font-size: 16px;
        font-weight: 700;
      }
      .pick-market {
        color: var(--muted);
        font-size: 13px;
      }
      .pick-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px 12px;
      }
      .pick-row {
        display: flex;
        gap: 6px;
        align-items: baseline;
      }
      .pick-label {
        color: var(--muted);
        font-size: 12px;
      }
      .pick-value {
        font-size: 13px;
        font-weight: 600;
      }
      .pick-notes {
        margin-top: 10px;
        color: var(--muted);
        font-size: 13px;
      }
      .pill {
        border-radius: 999px;
        padding: 4px 9px;
        font-size: 12px;
        font-weight: 800;
        border: 1px solid #334155;
      }
      .pill-neutral { color: var(--text); }
      .pill-green { color: #86efac; border-color: #166534; background: rgba(34, 197, 94, 0.12); }
      .pill-red { color: #fca5a5; border-color: #7f1d1d; background: rgba(239, 68, 68, 0.12); }
      .badge-model {
        border-radius: 999px;
        padding: 3px 10px;
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 0.04em;
        background: rgba(34, 197, 94, 0.15);
        color: #86efac;
        border: 1px solid #166534;
      }
      .badge-fallback {
        border-radius: 999px;
        padding: 3px 10px;
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 0.04em;
        background: rgba(245, 158, 11, 0.15);
        color: #fcd34d;
        border: 1px solid #92400e;
      }
      .ev-positive { color: #86efac; font-weight: 700; }
      .ev-negative { color: #fca5a5; font-weight: 700; }
      .ev-neutral  { color: var(--muted); font-weight: 700; }
      @media (max-width: 1000px) {
        .toolbar { grid-template-columns: 1fr 1fr; }
        .table-wrap { overflow-x: auto; }
        table { min-width: 1000px; }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>PropEdge</h1>
      <div class="subtitle">NHL-first EV props dashboard using live backend data.</div>

      <div class="toolbar">
        <div class="field">
          <label for="sport">Sport</label>
          <select id="sport">
            <option value="NHL" selected>NHL</option>
            <option value="NBA">NBA</option>
            <option value="MLB">MLB</option>
            <option value="NFL">NFL</option>
          </select>
        </div>

        <div class="field">
          <label for="market">Market</label>
          <select id="market">
            <option value="all" selected>All Markets</option>
            <option value="Shots on Goal">Shots on Goal</option>
            <option value="Assists">Assists</option>
            <option value="Points">Points</option>
          </select>
        </div>

        <div class="field">
          <label for="book">Sportsbook</label>
          <select id="book">
            <option value="all" selected>All Books</option>
            <option value="DraftKings">DraftKings</option>
            <option value="FanDuel">FanDuel</option>
            <option value="BetMGM">BetMGM</option>
            <option value="Caesars">Caesars</option>
          </select>
        </div>

        <div class="field">
          <label for="team">Team</label>
          <input id="team" type="text" placeholder="Any team" />
        </div>

        <div class="field">
          <label for="minEv">Min EV %</label>
          <input id="minEv" type="number" value="2" step="0.1" />
        </div>

        <button class="btn-primary" id="loadBtn">Load Live Picks</button>
        <button class="btn-secondary" id="resetBtn">Reset</button>
      </div>

      <div class="status" id="statusText">Ready to load live data.</div>

      <div id="allPicksCount" class="status">All picks: 0</div>
      <div id="topPointsSection"></div>
      <div id="topAssistsSection"></div>
      <div id="topShotsSection"></div>
    </div>

    <script>
    const BACKEND_URL = "https://gamblebot3-00.onrender.com";

  const els = {
    loadBtn: document.getElementById("loadBtn"),
    resetBtn: document.getElementById("resetBtn"),
    statusText: document.getElementById("statusText"),
    pointsSection: document.getElementById("topPointsSection"),
    assistsSection: document.getElementById("topAssistsSection"),
    shotsSection: document.getElementById("topShotsSection"),
    allPicksCount: document.getElementById("allPicksCount")
  };

  function asDisplay(value) {
    if (value === null || value === undefined || value === "") return "—";
    return String(value);
  }

  function asPercentDisplay(value) {
    if (value === null || value === undefined || value === "") return "—";
    if (typeof value === "number") {
      const percent = value <= 1 && value >= 0 ? value * 100 : value;
      return `${percent.toFixed(1)}%`;
    }
    const str = String(value);
    return str.includes("%") ? str : str;
  }

  function evNumber(value) {
    if (typeof value === "number") return value;
    if (typeof value === "string") {
      const cleaned = value.replace(/%/g, "").trim();
      const parsed = Number(cleaned);
      return Number.isFinite(parsed) ? parsed : 0;
    }
    return 0;
  }

  function evPillClass(value) {
    if (value > 0) return "pill pill-green";
    if (value < 0) return "pill pill-red";
    return "pill pill-neutral";
  }

  function renderCard(pick) {
    const market = pick.market || "";
    const isShots = String(market).toLowerCase() === "shots on goal";
    const evVal = evNumber(pick.ev);
    const evText = asPercentDisplay(pick.ev);
    const fairProbText = asPercentDisplay(pick.fairProb);
    const evClass = evVal > 0 ? "ev-positive" : evVal < 0 ? "ev-negative" : "ev-neutral";

    // Badge: only for Shots on Goal cards
    let badgeHtml = "";
    if (isShots) {
      const notes = String(pick.notes || "");
      if (notes.includes("model EV estimate using NHL recent SOG data")) {
        badgeHtml = `<span class="badge-model">Model Pick</span>`;
      } else if (notes.includes("no-vig fallback")) {
        badgeHtml = `<span class="badge-fallback">Fallback</span>`;
      }
    }

    const prominent = isShots
      ? `
        <div style="display:flex; gap:8px; flex-wrap:wrap; align-items:center;">
          ${badgeHtml}
          <span class="${evPillClass(evVal)}">EV ${evText}</span>
          <span class="pill pill-neutral">Fair ${fairProbText}</span>
        </div>
      `
      : "";

    // Extra rows shown only for Shots on Goal
    const shotExtraRows = isShots ? `
          <div class="pick-row"><span class="pick-label">Proj SOG</span><span class="pick-value">${pick.proj != null && pick.proj !== 0 ? Number(pick.proj).toFixed(2) : "—"}</span></div>
          <div class="pick-row"><span class="pick-label">Confidence</span><span class="pick-value">${pick.confidence != null ? pick.confidence + "%" : "—"}</span></div>
    ` : "";

    return `
      <div class="pick-card">
        <div class="pick-card-head">
          <div>
            <div class="pick-player">${asDisplay(pick.player)}</div>
            <div class="pick-market">${asDisplay(pick.market)}</div>
          </div>
          ${prominent}
        </div>
        <div class="pick-grid">
          <div class="pick-row"><span class="pick-label">Side</span><span class="pick-value">${asDisplay(pick.side)}</span></div>
          <div class="pick-row"><span class="pick-label">Line</span><span class="pick-value">${asDisplay(pick.line)}</span></div>
          <div class="pick-row"><span class="pick-label">Book</span><span class="pick-value">${asDisplay(pick.book)}</span></div>
          <div class="pick-row"><span class="pick-label">Odds</span><span class="pick-value">${asDisplay(pick.odds)}</span></div>
          <div class="pick-row"><span class="pick-label">Implied Prob</span><span class="pick-value">${asPercentDisplay(pick.impliedProb)}</span></div>
          <div class="pick-row"><span class="pick-label">Fair Prob</span><span class="pick-value">${fairProbText}</span></div>
          <div class="pick-row"><span class="pick-label">EV</span><span class="pick-value ${evClass}">${evText}</span></div>
          ${shotExtraRows}
        </div>
        <div class="pick-notes"><strong>Notes:</strong> ${asDisplay(pick.notes)}</div>
      </div>
    `;
  }

  function renderSection(element, items) {
    if (!element) return;
    if (!items || !items.length) {
      element.innerHTML = `<div class="pick-card">No live props found.</div>`;
      return;
    }
    element.innerHTML = items.map(renderCard).join("");
  }

  async function loadLiveProps() {
    try {
      els.statusText.textContent = "Loading live NHL props...";

      const response = await fetch(`${BACKEND_URL}/api/top-ev-picks?sport=NHL`);
      if (!response.ok) {
        throw new Error(`HTTP ${response.status}`);
      }

      const data = await response.json();
      console.log("LIVE DATA", data);

      const topPoints = data.topPoints || [];
      const topAssists = data.topAssists || [];
      const topShots = data.topShots || [];
      const allPicksCount = data.allPicksCount || 0;

      renderSection(els.pointsSection, topPoints);
      renderSection(els.assistsSection, topAssists);
      renderSection(els.shotsSection, topShots);

      if (els.allPicksCount) {
        els.allPicksCount.textContent = `All picks: ${allPicksCount}`;
      }

      els.statusText.textContent = "Loaded live NHL props successfully.";
    } catch (error) {
      const errorStatus = error?.message || "Unknown error";
      renderSection(els.pointsSection, []);
      renderSection(els.assistsSection, []);
      renderSection(els.shotsSection, []);
      els.statusText.textContent = `No live props found. Error status: ${errorStatus}`;
      console.error(error);
    }
  }

  if (els.loadBtn) {
    els.loadBtn.addEventListener("click", loadLiveProps);
  }

  if (els.resetBtn) {
    els.resetBtn.addEventListener("click", () => {
      if (els.pointsSection) els.pointsSection.innerHTML = "";
      if (els.assistsSection) els.assistsSection.innerHTML = "";
      if (els.shotsSection) els.shotsSection.innerHTML = "";
      if (els.allPicksCount) els.allPicksCount.textContent = "All picks: 0";
      els.statusText.textContent = "Ready to load live data.";
    });
  }

  loadLiveProps();
    </script>
  </body>
</html>
