<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PropEdge</title>
    <link rel="icon" href="/Gamblebot3.0/favicon.svg" />
    <meta name="theme-color" content="#0b1220" />
    <style>
      :root {
        --bg: #08111f;
        --panel: #0f172a;
        --line: #243244;
        --text: #e5edf7;
        --muted: #9fb0c7;
        --green: #22c55e;
        --yellow: #f59e0b;
        --red: #ef4444;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #08111f;
        color: var(--text);
      }
      .wrap {
        max-width: 1200px;
        margin: 0 auto;
        padding: 24px 16px 48px;
      }
      h1 {
        margin: 0 0 6px;
        font-size: 34px;
      }
      .subtitle {
        color: var(--muted);
        margin-bottom: 18px;
      }
      .toolbar {
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr)) auto auto;
        gap: 12px;
        margin-bottom: 18px;
      }
      .field {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 10px;
      }
      .field label {
        display: block;
        font-size: 12px;
        color: var(--muted);
        margin-bottom: 6px;
      }
      .field input, .field select {
        width: 100%;
        background: #0b1220;
        color: var(--text);
        border: 1px solid #334155;
        border-radius: 8px;
        padding: 10px 12px;
      }
      button {
        border: 0;
        border-radius: 10px;
        padding: 11px 14px;
        font-weight: 700;
        cursor: pointer;
        align-self: end;
      }
      .btn-primary {
        background: var(--green);
        color: #05210e;
      }
      .btn-secondary {
        background: #1e293b;
        color: var(--text);
        border: 1px solid #334155;
      }
      .status {
        margin-bottom: 14px;
        color: var(--muted);
      }
      .card {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 16px;
        margin-bottom: 18px;
      }
      .error {
        color: #fca5a5;
      }
      .ok {
        color: #86efac;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th, td {
        padding: 12px 10px;
        text-align: left;
        border-bottom: 1px solid #1f2d3f;
        font-size: 14px;
      }
      th {
        color: var(--muted);
      }
      .green { color: #86efac; font-weight: 700; }
      .yellow { color: #fcd34d; font-weight: 700; }
      .red { color: #fca5a5; font-weight: 700; }
      @media (max-width: 1000px) {
        .toolbar { grid-template-columns: 1fr 1fr; }
        .table-wrap { overflow-x: auto; }
        table { min-width: 1000px; }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>PropEdge</h1>
      <div class="subtitle">NHL-first EV props dashboard using live backend data.</div>

      <div class="toolbar">
        <div class="field">
          <label for="sport">Sport</label>
          <select id="sport">
            <option value="NHL" selected>NHL</option>
            <option value="NBA">NBA</option>
            <option value="MLB">MLB</option>
            <option value="NFL">NFL</option>
          </select>
        </div>

        <div class="field">
          <label for="market">Market</label>
          <select id="market">
            <option value="all" selected>All Markets</option>
            <option value="Shots on Goal">Shots on Goal</option>
            <option value="Assists">Assists</option>
            <option value="Points">Points</option>
          </select>
        </div>

        <div class="field">
          <label for="book">Sportsbook</label>
          <select id="book">
            <option value="all" selected>All Books</option>
            <option value="DraftKings">DraftKings</option>
            <option value="FanDuel">FanDuel</option>
            <option value="BetMGM">BetMGM</option>
            <option value="Caesars">Caesars</option>
          </select>
        </div>

        <div class="field">
          <label for="team">Team</label>
          <input id="team" type="text" placeholder="Any team" />
        </div>

        <div class="field">
          <label for="minEv">Min EV %</label>
          <input id="minEv" type="number" value="2" step="0.1" />
        </div>

        <button class="btn-primary" id="loadBtn">Load Live Picks</button>
        <button class="btn-secondary" id="resetBtn">Reset</button>
      </div>

      <div class="status" id="statusText">Ready to load live data.</div>

      <div class="card table-wrap">
        <table>
          <thead>
            <tr>
              <th>Player</th>
              <th>Team</th>
              <th>Opp</th>
              <th>Market</th>
              <th>Line</th>
              <th>Side</th>
              <th>Book</th>
              <th>Odds</th>
              <th>Proj</th>
              <th>Fair %</th>
              <th>Implied %</th>
              <th>EV %</th>
              <th>Confidence</th>
              <th>Notes</th>
            </tr>
          </thead>
          <tbody id="propsTable"></tbody>
        </table>
      </div>
    </div>

    <script>
      const BACKEND_URL = "YOUR_BACKEND_URL";

      const els = {
        sport: document.getElementById("sport"),
        market: document.getElementById("market"),
        book: document.getElementById("book"),
        team: document.getElementById("team"),
        minEv: document.getElementById("minEv"),
        loadBtn: document.getElementById("loadBtn"),
        resetBtn: document.getElementById("resetBtn"),
        statusText: document.getElementById("statusText"),
        propsTable: document.getElementById("propsTable")
      };

      function evTextClass(ev) {
        if (ev >= 4) return "green";
        if (ev >= 2) return "yellow";
        return "red";
      }

      function renderTable(rows) {
        if (!rows.length) {
          els.propsTable.innerHTML = `
            <tr>
              <td colspan="14">No live props matched your filters.</td>
            </tr>
          `;
          return;
        }

        els.propsTable.innerHTML = rows.map(p => `
          <tr>
            <td>${p.player ?? ""}</td>
            <td>${p.team ?? ""}</td>
            <td>${p.opp ?? ""}</td>
            <td>${p.market ?? ""}</td>
            <td>${p.line ?? ""}</td>
            <td>${p.side ?? ""}</td>
            <td>${p.book ?? ""}</td>
            <td>${p.odds ?? ""}</td>
            <td>${p.proj ?? ""}</td>
            <td>${p.fairProb ?? ""}</td>
            <td>${p.impliedProb ?? ""}</td>
            <td class="${evTextClass(Number(p.ev || 0))}">${p.ev ?? ""}</td>
            <td>${p.confidence ?? ""}</td>
            <td>${p.notes ?? ""}</td>
          </tr>
        `).join("");
      }

      async function loadLiveProps() {
        const sport = els.sport.value;
        const market = els.market.value;
        const book = els.book.value;
        const team = els.team.value.trim();
        const minEv = els.minEv.value;

        const params = new URLSearchParams({
          sport,
          market,
          book,
          team,
          minEv
        });

        const url = `${BACKEND_URL}/api/top-ev-picks?${params.toString()}`;

        els.statusText.textContent = "Loading live data...";

        try {
          const res = await fetch(url);
          if (!res.ok) {
            throw new Error(`HTTP ${res.status}`);
          }

          const data = await res.json();
          const rows = Array.isArray(data) ? data : (data.picks || []);
          renderTable(rows);
          els.statusText.innerHTML = `<span class="ok">Loaded ${rows.length} live props.</span>`;
        } catch (err) {
          els.propsTable.innerHTML = `
            <tr>
              <td colspan="14">Failed to load live backend data.</td>
            </tr>
          `;
          els.statusText.innerHTML = `<span class="error">Error loading live data. Check backend URL, CORS, and endpoint response.</span>`;
        }
      }

      els.loadBtn.addEventListener("click", loadLiveProps);

      els.resetBtn.addEventListener("click", () => {
        els.sport.value = "NHL";
        els.market.value = "all";
        els.book.value = "all";
        els.team.value = "";
        els.minEv.value = 2;
        els.propsTable.innerHTML = "";
        els.statusText.textContent = "Ready to load live data.";
      });
    </script>
  </body>
</html>
