<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PropEdge</title>
    <link rel="icon" href="/Gamblebot3.0/favicon.svg" />
    <meta name="theme-color" content="#0b1220" />
    <style>
      :root {
        --bg: #08111f;
        --panel: #0f172a;
        --line: #243244;
        --text: #e5edf7;
        --muted: #9fb0c7;
        --green: #22c55e;
        --yellow: #f59e0b;
        --red: #ef4444;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #08111f;
        color: var(--text);
      }
      .wrap {
        max-width: 1200px;
        margin: 0 auto;
        padding: 24px 16px 48px;
      }
      h1 {
        margin: 0 0 6px;
        font-size: 34px;
      }
      .subtitle {
        color: var(--muted);
        margin-bottom: 18px;
      }
      .toolbar {
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr)) auto auto;
        gap: 12px;
        margin-bottom: 18px;
      }
      .field {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 10px;
      }
      .field label {
        display: block;
        font-size: 12px;
        color: var(--muted);
        margin-bottom: 6px;
      }
      .field input, .field select {
        width: 100%;
        background: #0b1220;
        color: var(--text);
        border: 1px solid #334155;
        border-radius: 8px;
        padding: 10px 12px;
      }
      button {
        border: 0;
        border-radius: 10px;
        padding: 11px 14px;
        font-weight: 700;
        cursor: pointer;
        align-self: end;
      }
      .btn-primary {
        background: var(--green);
        color: #05210e;
      }
      .btn-secondary {
        background: #1e293b;
        color: var(--text);
        border: 1px solid #334155;
      }
      .status {
        margin-bottom: 14px;
        color: var(--muted);
      }
      .card {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 16px;
        margin-bottom: 18px;
      }
      .error {
        color: #fca5a5;
      }
      .ok {
        color: #86efac;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th, td {
        padding: 12px 10px;
        text-align: left;
        border-bottom: 1px solid #1f2d3f;
        font-size: 14px;
      }
      th {
        color: var(--muted);
      }
      .green { color: #86efac; font-weight: 700; }
      .yellow { color: #fcd34d; font-weight: 700; }
      .red { color: #fca5a5; font-weight: 700; }
      @media (max-width: 1000px) {
        .toolbar { grid-template-columns: 1fr 1fr; }
        .table-wrap { overflow-x: auto; }
        table { min-width: 1000px; }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>PropEdge</h1>
      <div class="subtitle">NHL-first EV props dashboard using live backend data.</div>

      <div class="toolbar">
        <div class="field">
          <label for="sport">Sport</label>
          <select id="sport">
            <option value="NHL" selected>NHL</option>
            <option value="NBA">NBA</option>
            <option value="MLB">MLB</option>
            <option value="NFL">NFL</option>
          </select>
        </div>

        <div class="field">
          <label for="market">Market</label>
          <select id="market">
            <option value="all" selected>All Markets</option>
            <option value="Shots on Goal">Shots on Goal</option>
            <option value="Assists">Assists</option>
            <option value="Points">Points</option>
          </select>
        </div>

        <div class="field">
          <label for="book">Sportsbook</label>
          <select id="book">
            <option value="all" selected>All Books</option>
            <option value="DraftKings">DraftKings</option>
            <option value="FanDuel">FanDuel</option>
            <option value="BetMGM">BetMGM</option>
            <option value="Caesars">Caesars</option>
          </select>
        </div>

        <div class="field">
          <label for="team">Team</label>
          <input id="team" type="text" placeholder="Any team" />
        </div>

        <div class="field">
          <label for="minEv">Min EV %</label>
          <input id="minEv" type="number" value="2" step="0.1" />
        </div>

        <button class="btn-primary" id="loadBtn">Load Live Picks</button>
        <button class="btn-secondary" id="resetBtn">Reset</button>
      </div>

      <div class="status" id="statusText">Ready to load live data.</div>

      <div id="allPicksCount" class="status"></div>

      <div id="topPointsSection">
        <h2>Top 10 Points</h2>
        <div id="topPointsCards"></div>
      </div>
      <div id="topAssistsSection">
        <h2>Top 10 Assists</h2>
        <div id="topAssistsCards"></div>
      </div>
      <div id="topShotsSection">
        <h2>Top 10 Shots on Goal</h2>
        <div id="topShotsCards"></div>
      </div>
    </div>

    <script>
      const BACKEND_URL = "https://gamblebot3-0.onrender.com";

      const els = {
        sport: document.getElementById("sport"),
        market: document.getElementById("market"),
        book: document.getElementById("book"),
        team: document.getElementById("team"),
        minEv: document.getElementById("minEv"),
        loadBtn: document.getElementById("loadBtn"),
        resetBtn: document.getElementById("resetBtn"),
        statusText: document.getElementById("statusText"),
        allPicksCount: document.getElementById("allPicksCount"),
        topPointsCards: document.getElementById("topPointsCards"),
        topAssistsCards: document.getElementById("topAssistsCards"),
        topShotsCards: document.getElementById("topShotsCards")
      };

      function evTextClass(ev) {
        if (ev >= 4) return "green";
        if (ev >= 2) return "yellow";
        return "red";
      }


      function renderCards(arr, container) {
        if (!arr || !arr.length) {
          container.innerHTML = `<div class="status">No picks found.</div>`;
          return;
        }
        container.innerHTML = arr.map(p => `
          <div class="card">
            <div><b>Player:</b> ${p.player ?? ""}</div>
            <div><b>Market:</b> ${p.market ?? ""}</div>
            <div><b>Side:</b> ${p.side ?? ""}</div>
            <div><b>Line:</b> ${p.line ?? ""}</div>
            <div><b>Book:</b> ${p.book ?? ""}</div>
            <div><b>Odds:</b> ${p.odds ?? ""}</div>
            <div><b>Implied %:</b> ${p.impliedProb ?? ""}</div>
            <div><b>Notes:</b> ${p.notes ?? ""}</div>
          </div>
        `).join("");
      }


      async function loadLiveProps() {
        const book = els.book.value !== "all" ? els.book.value : undefined;
        const params = new URLSearchParams();
        if (book) params.set("book", book);

        const url = `${BACKEND_URL}/api/top-ev-picks?${params.toString()}`;

        els.statusText.textContent = "Loading live data...";

        try {
          const res = await fetch(url);
          if (!res.ok) {
            throw new Error(`HTTP ${res.status}`);
          }

          const data = await res.json();
          els.allPicksCount.textContent = `Total live props: ${data.allPicksCount ?? 0}`;
          renderCards(data.topPoints, els.topPointsCards);
          renderCards(data.topAssists, els.topAssistsCards);
          renderCards(data.topShots, els.topShotsCards);
          els.statusText.innerHTML = `<span class="ok">Loaded live props.</span>`;
        } catch (err) {
          els.allPicksCount.textContent = "";
          els.topPointsCards.innerHTML = els.topAssistsCards.innerHTML = els.topShotsCards.innerHTML = "<div class='status'>Failed to load live backend data.</div>";
          els.statusText.innerHTML = `<span class="error">Error loading live data. Check backend URL, CORS, and endpoint response.</span>`;
        }
      }

      els.loadBtn.addEventListener("click", loadLiveProps);

      els.resetBtn.addEventListener("click", () => {
        els.sport.value = "NHL";
        els.market.value = "all";
        els.book.value = "all";
        els.team.value = "";
        els.minEv.value = 2;
        els.allPicksCount.textContent = "";
        els.topPointsCards.innerHTML = els.topAssistsCards.innerHTML = els.topShotsCards.innerHTML = "";
        els.statusText.textContent = "Ready to load live data.";
      });
    </script>
  </body>
</html>
